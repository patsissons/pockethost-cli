# Drafts a GitHub release (with generated notes) whenever a push to main
# changes the version in package.json. Publishing the draft triggers the
# Publish workflow, which deploys to npm.
name: Draft release

on:
  push:
    branches: [main]
    paths: [package.json]

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect version bump
        id: bump
        run: |
          current="$(node -p "require('./package.json').version")"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          previous="none"
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            if git show HEAD^:package.json > /tmp/prev-package.json 2>/dev/null; then
              previous="$(node -p "require('/tmp/prev-package.json').version")"
            fi
          fi
          echo "previous version: $previous, current version: $current"
          if [ "$current" != "$previous" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create draft release
        if: steps.bump.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.bump.outputs.current }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists — skipping."
            exit 0
          fi
          gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
            --draft --generate-notes --title "$tag"
          echo "Drafted release $tag — review the notes and publish to deploy to npm."
