# Tier 3: scaffold each framework with the real CLI, install its deps, and
# run the scaffolded app's own validate:quick. This is the drift detector for
# the pinned template dependencies.
name: Smoke

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

jobs:
  scaffold:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [vite-react, sveltekit, react-router, nextjs]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # runners have no git identity; the scaffolder's modular commits need one
      - run: |
          git config --global user.name "smoke-bot"
          git config --global user.email "smoke-bot@users.noreply.github.com"
      # create runs install + the scaffolded app's validate:quick
      - run: >
          pnpm dev create "$RUNNER_TEMP/smoke-app" --name smoke-app --yes
          --skip-phio --no-deploy --framework ${{ matrix.framework }}
      # validate must not mutate the scaffold (e.g. a typegen that edits
      # package.json) — a dirty tree here means a template is incomplete
      - run: |
          if [ -n "$(git -C "$RUNNER_TEMP/smoke-app" status --porcelain)" ]; then
            echo "scaffolded app tree is dirty after validate:" >&2
            git -C "$RUNNER_TEMP/smoke-app" status --porcelain >&2
            git -C "$RUNNER_TEMP/smoke-app" diff >&2
            exit 1
          fi
